<style>
:root {
  --bg: #0f0e17;
  --surface: #1a1a2e;
  --accent: #e94560;
  --gold: #c9a84c;
  --green: #4caf82;
  --text-primary: #fffffe;
  --text-secondary: #a7a9be;
  --text-dim: #4a4e69;
  --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg); color: var(--text-primary);
  font-family: 'Crimson Pro', Georgia, serif;
  height: 100vh; height: -webkit-fill-available;
  display: flex; flex-direction: column;
  overflow: hidden; position: fixed; width: 100%;
}
.screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.screen.active { display: flex; }

/* ── DECK LIST ── */
.dl-header { padding: 52px 24px 16px; }
.dl-title { font-family:'Noto Serif SC',serif; font-size:26px; color:var(--gold); }
.dl-sub { font-size:13px; color:var(--text-secondary); margin-top:4px; }
.dl-scroll { flex:1; overflow-y:auto; padding:8px 24px 40px; -webkit-overflow-scrolling:touch; }

.deck-card {
  background: linear-gradient(135deg,#1e2140,#16213e);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius:16px; padding:20px; margin-bottom:14px;
  cursor:pointer; position:relative; overflow:hidden;
  transition: transform 0.15s;
}
.deck-card:active { transform:scale(0.98); }
.deck-card::after {
  content: attr(data-icon);
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  font-family:'Noto Serif SC',serif; font-size:52px; font-weight:700;
  color:rgba(255,255,255,0.04); pointer-events:none;
}
.deck-name { font-size:18px; margin-bottom:5px; }
.deck-meta { font-size:13px; color:var(--text-secondary); margin-bottom:10px; }
.deck-bar { height:4px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; margin-bottom:8px; }
.deck-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--gold)); border-radius:2px; transition:width 0.4s; }
.deck-stats { display:flex; gap:14px; font-size:12px; letter-spacing:0.05em; text-transform:uppercase; }
.s-known { color:var(--green); }
.s-not { color:var(--accent); }
.s-unseen { color:var(--text-dim); }

/* ── STUDY SCREEN ── */
.study-header {
  display:flex; align-items:center; gap:12px;
  padding:52px 20px 10px;
}
.btn-back {
  background:rgba(255,255,255,0.06); border:none; color:var(--text-secondary);
  border-radius:10px; width:36px; height:36px;
  display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
}
.study-name { font-size:16px; flex:1; line-height:1.2; }
.card-ctr { font-size:13px; color:var(--text-secondary); }

.prog-wrap { padding:0 20px 10px; }
.prog-track { height:3px; background:var(--text-dim); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--gold)); border-radius:2px; transition:width 0.4s; }
.prog-labels { display:flex; justify-content:space-between; margin-top:5px; font-size:11px; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase; }

.stage { flex:1; display:flex; align-items:center; justify-content:center; padding:10px 20px; }

.card-wrap {
  width:100%; max-width:360px; height:400px;
  position:relative; cursor:pointer;
  animation:cardIn 0.35s ease both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:none; }
}
.card-face {
  position:absolute; inset:0; border-radius:var(--radius);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:28px 24px; user-select:none;
  transition: opacity 0.3s ease;
}
/* front shown, back hidden */
.cf { opacity:1; }
.cb { opacity:0; pointer-events:none; }
/* after flip */
.card-wrap.flipped .cf { opacity:0; pointer-events:none; }
.card-wrap.flipped .cb { opacity:1; pointer-events:auto; }

.cf {
  background:linear-gradient(145deg,#1e2140,#16213e);
  border:1px solid rgba(201,168,76,0.15);
  box-shadow:0 20px 60px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05);
}
.cf::before {
  content:''; position:absolute; inset:0; border-radius:var(--radius);
  background:
    radial-gradient(circle at 20% 20%,rgba(201,168,76,0.06) 0%,transparent 60%),
    radial-gradient(circle at 80% 80%,rgba(233,69,96,0.06) 0%,transparent 60%);
  pointer-events:none;
}
.cb {
  background:linear-gradient(145deg,#0f3460,#0a2744);
  border:1px solid rgba(233,69,96,0.2);
  box-shadow:0 20px 60px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05);
}
.cb::before {
  content:''; position:absolute; inset:0; border-radius:var(--radius);
  background:
    radial-gradient(circle at 80% 20%,rgba(233,69,96,0.08) 0%,transparent 60%),
    radial-gradient(circle at 20% 80%,rgba(201,168,76,0.08) 0%,transparent 60%);
  pointer-events:none;
}

.card-lbl { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); margin-bottom:16px; }
.tags-row { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:12px; }
.tag {
  font-size:11px; padding:3px 10px; border-radius:20px;
  background:rgba(201,168,76,0.12); color:var(--gold);
  border:1px solid rgba(201,168,76,0.25);
  font-family:'Noto Serif SC',serif;
}
.eng-word { font-size:clamp(24px,6vw,34px); font-weight:300; font-style:italic; text-align:center; line-height:1.3; margin-bottom:20px; }
.tap-hint { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-dim); letter-spacing:0.1em; margin-top:auto; }
.tap-hint svg { animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.1)} }

.cn-char { font-family:'Noto Serif SC',serif; font-size:clamp(46px,13vw,70px); font-weight:700; margin-bottom:4px; text-shadow:0 0 40px rgba(201,168,76,0.3); letter-spacing:0.05em; }
.pinyin { font-size:19px; font-weight:300; color:var(--gold); margin-bottom:6px; letter-spacing:0.05em; }
.audio-btn {
  background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.28);
  color:var(--gold); border-radius:20px; padding:5px 14px; font-size:13px;
  cursor:pointer; display:flex; align-items:center; gap:6px;
  margin-bottom:14px; font-family:'Crimson Pro',serif; transition:background 0.2s;
}
.audio-btn:active { background:rgba(201,168,76,0.28); }
.divider { width:40px; height:1px; background:rgba(255,255,255,0.12); margin-bottom:12px; }
.eng-hint { font-size:14px; font-style:italic; color:var(--text-secondary); text-align:center; line-height:1.4; }

/* controls */
.controls { padding:10px 20px 36px; display:flex; gap:10px; }
.btn-rate {
  flex:1; padding:13px 8px; border:none; border-radius:14px;
  font-family:'Crimson Pro',serif; font-size:15px; letter-spacing:0.03em;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:transform 0.15s;
}
.btn-rate:active { transform:scale(0.96); }
.btn-no { background:rgba(233,69,96,0.15); color:var(--accent); border:1px solid rgba(233,69,96,0.3); }
.btn-skip { flex:0.55; background:rgba(255,255,255,0.05); color:var(--text-secondary); border:1px solid rgba(255,255,255,0.08); }
.btn-yes { background:rgba(76,175,130,0.15); color:var(--green); border:1px solid rgba(76,175,130,0.3); }

/* watermark */
.wm { position:fixed; bottom:-20px; right:-10px; font-family:'Noto Serif SC',serif; font-size:150px; font-weight:700; color:rgba(255,255,255,0.015); pointer-events:none; user-select:none; line-height:1; }

/* done */
.done-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px; text-align:center; gap:12px; }
.done-char { font-family:'Noto Serif SC',serif; font-size:70px; color:var(--gold); }
.done-title { font-size:25px; font-style:italic; font-weight:300; }
.done-stats { display:flex; gap:24px; margin:8px 0; }
.done-stat { text-align:center; }
.done-num { font-size:30px; font-weight:300; }
.done-lbl { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); }
.btn-again { padding:13px 36px; background:linear-gradient(135deg,var(--accent),#c73652); color:white; border:none; border-radius:14px; font-family:'Crimson Pro',serif; font-size:16px; letter-spacing:0.05em; cursor:pointer; }
.btn-home-done { padding:10px 28px; background:transparent; color:var(--text-secondary); border:1px solid rgba(255,255,255,0.1); border-radius:14px; font-family:'Crimson Pro',serif; font-size:15px; cursor:pointer; }
</style>
</head>

  DECKS.forEach(dk=>{

    d.className='deck-card'; d.setAttribute('data-icon',dk.icon);
    d.innerHTML=`
      <div class="deck-name">${dk.name}</div>
      <div class="deck-meta">${tot} cards · ${pct}% known</div>
      <div class="deck-bar"><div class="deck-bar-fill" style="width:${pct}%"></div></div>
      <div class="deck-stats">
        <span class="s-known">✓ ${known}</span>
        <span class="s-not">✗ ${no}</span>
        <span class="s-unseen">◦ ${tot-known-no} unseen</span>
      </div>`;
    d.onclick=()=>startDeck(dk);
    el.appendChild(d);
  });
}

// ── STUDY ────────────────────────────────────────────────────────────
function startDeck(dk){
  CUR=dk; CARDS=[...dk.cards]; IDX=0; FLIPPED=false;
  DPROG=load(dk.id);
  document.getElementById('studyName').textContent=dk.name;
  document.getElementById('progTotal').textContent=CARDS.length+' cards';
  showScreen('screenStudy');
  renderCard();
}

function renderCard(){
  const card=CARDS[IDX], tot=CARDS.length;
  const known=CARDS.filter(c=>DPROG[c.c]===true).length;
  document.getElementById('progFill').style.width=(known/tot*100)+'%';
  document.getElementById('progLbl').textContent=known+' known';
  document.getElementById('cardCtr').textContent=(IDX+1)+' / '+tot;
  document.getElementById('wm').textContent=card.c[0]||'学';
  FLIPPED=false;
  document.getElementById('controls').style.display='';
  const tagsHtml=card.t.length?`<div class="tags-row">${card.t.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:'';
  document.getElementById('stage').innerHTML=`
    <div class="card-wrap" id="cw">
      <div class="card-face cf">
        <div class="card-lbl">English → Chinese</div>
        ${tagsHtml}
        <div class="eng-word">${card.e}</div>
        <div class="tap-hint">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M7 11.5V14a5 5 0 0010 0v-2.5M12 3v8m0 0l-2.5-2.5M12 11l2.5-2.5"/>
          </svg>tap to reveal
        </div>
      </div>
      <div class="card-face cb">
        <div class="card-lbl">Chinese</div>
        ${tagsHtml}
        <div class="cn-char">${card.c}</div>
        <div class="pinyin">${py(card.c)}</div>
        <button class="audio-btn" id="audioBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
          </svg>Listen
        </button>
        <div class="divider"></div>
        <div class="eng-hint">${card.e}</div>
      </div>
    </div>`;

  // Attach events after DOM injection
  const cw = document.getElementById('cw');
  cw.addEventListener('click', flipCard);

  const ab = document.getElementById('audioBtn');
  ab.addEventListener('click', e => { e.stopPropagation(); speak(card.c); });
}

function flipCard(){
  const w=document.getElementById('cw'); if(!w) return;
  w.classList.toggle('flipped'); FLIPPED=!FLIPPED;
}

function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='zh-CN'; u.rate=0.85;
  window.speechSynthesis.speak(u);
}

function rateCard(known){
  if(!FLIPPED){ flipCard(); return; }
  DPROG[CARDS[IDX].c]=known;
  save(CUR.id,DPROG);
  advance();
}

function skipCard(){ advance(); }

function advance(){
  if(IDX<CARDS.length-1){ IDX++; renderCard(); }
  else showDone();
}

function showDone(){
  const tot=CARDS.length;
  const known=CARDS.filter(c=>DPROG[c.c]===true).length;
  const no=CARDS.filter(c=>DPROG[c.c]===false).length;
  document.getElementById('controls').style.display='none';
  document.getElementById('stage').innerHTML=`
    <div class="done-screen">
      <div class="done-char">好！</div>
      <div class="done-title">Deck complete</div>
      <div class="done-stats">
        <div class="done-stat"><div class="done-num" style="color:var(--green)">${known}</div><div class="done-lbl">Known</div></div>
        <div class="done-stat"><div class="done-num" style="color:var(--accent)">${no}</div><div class="done-lbl">Not yet</div></div>
        <div class="done-stat"><div class="done-num">${tot}</div><div class="done-lbl">Total</div></div>
      </div>
      <button class="btn-again" onclick="startDeck(CUR)">Study again</button>
      <button class="btn-home-done" onclick="goHome()">← All decks</button>
    </div>`;
}

function goHome(){ showScreen('screenDecks'); renderList(); }

// ── SWIPE ────────────────────────────────────────────────────────────
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(document.getElementById('screenStudy').classList.contains('active') && Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>60){
    dx<0?rateCard(true):rateCard(false);
  }
},{passive:true});

document.addEventListener('keydown',e=>{
  if(!document.getElementById('screenStudy').classList.contains('active')) return;
  if(e.key==='Enter'||e.key===' ') flipCard();
  if(e.key==='ArrowRight') rateCard(true);
  if(e.key==='ArrowLeft') rateCard(false);
  if(e.key==='ArrowDown') skipCard();
});

// ── SCREEN ───────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

renderList();
</script>
</body>
</html>
